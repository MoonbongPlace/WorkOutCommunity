spring:
  application:
    name: workout-community

  Jackson:
    time-zone: Asia/Seoul

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 32MB

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    database-platform: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

jwt:
  secret: ${JWT_SECRET}
  access-exp-seconds: ${JWT_ACCESS_EXPIRATION}
  refresh-exp-seconds: ${JWT_REFRESH_EXPIRATION}


openai:
  api-key: ${OPENAI_API_KEY}
  base-url: https://api.openai.com/v1
  model: gpt-4o-mini
  timeout-ms: 20000

aws:
  ses:
    region: ap-northeast-2
    from-address: mail@moonbong.kr

solapi:
  api-key: ${SOLAPI_API_KEY}
  api-secret: ${SOLAPI_API_SECRET}
  api-phone-number: ${SOLAPI_API_PHONE_NUMBER}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

app:
  frontend-base-url: ${FRONTEND_BASE_URL}