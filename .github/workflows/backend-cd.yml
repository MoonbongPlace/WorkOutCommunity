name: Backend CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean bootJar -x test

      - name: Verify jar contents
        run: |
            ls -l build/libs
            jar tf build/libs/workout-community-0.0.1-SNAPSHOT.jar | grep application

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/community-backend:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/community-backend:${{ github.sha }} \
            .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/community-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/community-backend:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/community-backend:${{ github.sha }}

            echo "=== pull image ==="
            docker pull $IMAGE
            
            echo "=== pulled image info ==="
            docker image inspect $IMAGE --format='{{.Id}} {{.RepoTags}}'

            echo "=== stop old container ==="
            docker stop community-backend || true
            docker rm community-backend || true

            echo "=== run new container ==="
            docker run -d \
              --name community-backend \
              --restart unless-stopped \
              --env-file /home/ec2-user/WorkOutCommunity/.env \
              -p 8080:8080 \
              $IMAGE  

            echo "=== docker ps -a ==="
            docker ps -a
            
            echo "=== container state right after run ==="
            docker inspect community-backend --format='status={{.State.Status}} exitCode={{.State.ExitCode}} startedAt={{.State.StartedAt}} finishedAt={{.State.FinishedAt}}'
      

            echo "=== wait for app ==="
            sleep 20

            echo "=== container state after wait ==="
            docker inspect community-backend --format='status={{.State.Status}} exitCode={{.State.ExitCode}} startedAt={{.State.StartedAt}} finishedAt={{.State.FinishedAt}}'

            echo "=== last 200 logs ==="
            docker logs community-backend --tail 200 || true
