name: Backend CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/community-backend:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/community-backend:${{ github.sha }} \
            .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/community-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/community-backend:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/community-backend:latest

            docker stop community-backend || true
            docker rm community-backend || true

            docker run -d \
              --name community-backend \
              --restart unless-stopped \
              --env-file /home/ec2-user/WorkOutCommunity/.env \
              -p 8080:8080 \
              ${{ secrets.DOCKERHUB_USERNAME }}/community-backend:latest

            sleep 10
            curl -f http://127.0.0.1:8080/actuator/health